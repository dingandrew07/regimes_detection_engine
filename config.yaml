paths:
  data_dir:      "data"
  cache_dir:     "cache"
  reports_dir:   "reports"

# src/state_variables/
state_variables:
  data_sources:
    market_file:        "spx_monthly.xlsx"     # SPX levels (monthly)
    copper_file:        "copper_monthly.xlsx"  # Copper spot
    spx_daily_file:     "spx_daily.xlsx"       # daily SPX for realised σ + corr

    # FRED tickers
    gs10:  "GS10"       # 10-Y constant-maturity yield
    tb3ms: "TB3MS"      # 3-month T-bill (also used for slope & policy)
    wti:   "WTISPLC"    # WTI spot
    dgs10: "DGS10"      # daily 10-Y yield for corr series

    # Market‐data APIs
    vix_ticker: "^VIX"  # yfinance symbol for VIX

  end_date: "2024-12-31"          # final observation for every series
  diff_months:   12               # 12-month difference (z-score)
  rolling_years: 10               # 10-year rolling σ  (z-score)
  rolling_min_periods: 12         # minimum periods (12 months = 1 year) for rolling std calculation (z-score)
  winsorize:
    lower: -3
    upper: 3

  # src/state_variables/similarity_score.py
  similarity_score:
    variable_weights:
      Market: 1.0                   # Market level (log S&P 500)
      "Yield curve": 1.0            # 10Y - 3M yield spread
      Oil: 1.0                      # WTI oil price
      Copper: 1.0                   # Copper price
      "Monetary policy": 1.0        # 3-month T-bill rate
      Volatility: 1.0               # Realized vol / VIX
      "Stock-bond correlation": 1.0 # 3-year rolling correlation
    mask_horizon:  36               # months excluded to avoid momentum bias (default: 36 months), change to 0 for similar_periods.py visualization
    similarity_window: 1            # rolling window for similarity calculation (1, 3, or 6 months)

  # src/state_variables/factor_returns.py
  factor_returns:
    end_date: "2024-12-31"          # final observation for every series (shared with state_variables)

# src/backtest/
backtest:
  n_buckets: 5                    # number of buckets for backtest
  back_test_start_date: "1985-01-31" # start date for backtest
  forward_look_months: 1          # number of months to look forward for returns (default: 1 month)
  vol_target: 0.15                # 15 % annual vol for targeting
  vol_window: 36                  # rolling window for vol targeting
  exhibit12_enabled: false        # if true, back_test.py runs 6 extra sweeps for Exhibit 12 (slow)

# src/analysis/
analysis:
  # src/analysis/similar_periods.py
  similar_periods:
    target_month: "2024-12"         # default target month for similar_periods.py

  # src/analysis/clustering_analysis.py
  clustering_analysis:
    k_min: 2                        # minimum number of clusters to test
    k_max: 6                        # maximum number of clusters to test
    random_state: 42                # random seed for reproducibility
    n_init: 10                      # number of k-means initializations
    max_iter: 300                   # maximum iterations for k-means
    pca_n_components: 2             # number of principal components for visualization

  # src/analysis/equal_weighted_exhibit.py (not run standalone; triggered from back_test.py)
  equal_weighted:
    enabled: false                        # if true, back_test.py writes reports/analysis/equal_weighted/exhibit_equal_weighted_performance.png

# src/regime_shifts/
regime_shifts:
  # src/regime_shifts/regime_shift.py
  regime_shift:
    lookback_periods: [12, 24, 36, 48]  # months for EWMA calculation (1-year, 2-year, 3-year, 4-year)

  # src/regime_shifts/alpha_by_regime.py
  alpha_by_regime:
    regime_method: "phase"                   # method for regime labeling: "phase", "percentile", or "absolute"
    low_threshold_percentile: 0.40           # lower EWMA percentile for phase method (stable vs elevated)
    high_threshold_percentile: 0.75          # upper EWMA percentile for phase method (elevated vs crisis)
    regime_threshold_percentile: 0.75         # percentile threshold (0-1) used when method="percentile"
    regime_threshold_absolute: 0.5           # absolute EWMA value threshold used when method="absolute"

  # src/regime_shifts/detection_quality.py
  detection_quality:
    known_events:
      - name: "GFC"
        shock_start: "2007-08-31"
        shock_end: "2009-03-31"
        plot_start: "2006-01-01"
        plot_end: "2011-12-31"
      - name: "COVID"
        shock_start: "2020-02-29"
        shock_end: "2020-03-31"
        plot_start: "2019-01-01"
        plot_end: "2021-12-31"
    stable_buffer_months: 6                    # exclude N months around each event from "stable" pool
    lag_anchor: "shock_end"                    # "shock_end" | "shock_start" — anchor for resolution lag
    detection_window_months: 24                # max months after shock_start to count as "detected"

  # src/regime_shifts/regime_gating.py (hooks into back_test.py when enabled)
  regime_gating:
    enabled: true                           # scale backtest returns by regime exposure (0 = cash, 1 = full)
    mode: "resolution_only"                  # "resolution_only" | "exclude_crisis_onset"

# src/extensions/
extensions:
  efficacy_score:
    enabled: false                      # Enable efficacy score extension for confidence scaling
    bootstrap_iterations: 200           # Number of bootstrap iterations (default: 200)
    random_seed: 42                     # random seed for efficacy bootstrap
    save_series: true                   # Save efficacy and multiplier time series for plotting

  random_long_bias:
    enabled: false                        # generate random long bias investigation exhibit
    random_long_bias: 0.75                # probability of long signal in random bias (default: 0.75 = 75% long bias)
    random_seed: 42                       # random seed for reproducibility
